<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>AR Viewer — Museum Virtual</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000; font-family:'Georgia',serif; }

    #ar-ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; }

    /* Header */
    #ar-header {
      position:absolute; top:0; left:0; right:0;
      padding:14px 16px 12px;
      background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
      display:flex; align-items:center; gap:12px;
    }
    #btn-back {
      pointer-events:all;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.25);
      color:#fff; padding:7px 14px;
      font-size:12px; letter-spacing:1px;
      cursor:pointer; border-radius:2px;
      font-family:'Georgia',serif;
      transition:background .2s; white-space:nowrap;
    }
    #btn-back:hover { background:rgba(255,255,255,.22); }
    #ar-collection-name {
      color:#f5e6c8;
      font-size:clamp(12px,3.5vw,16px);
      letter-spacing:2px; text-transform:uppercase;
      text-shadow:0 1px 8px rgba(0,0,0,.9); flex:1;
    }

    /* Marker guide */
    #marker-guide {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; transition:opacity .5s;
    }
    #marker-guide.hidden { opacity:0; pointer-events:none; }
    #marker-frame {
      width:clamp(140px,40vw,180px); height:clamp(140px,40vw,180px);
      border:2px dashed rgba(255,255,255,.4);
      border-radius:4px; margin:0 auto 16px;
      position:relative; display:flex; align-items:center; justify-content:center;
    }
    #marker-frame::before, #marker-frame::after {
      content:''; position:absolute;
      width:20px; height:20px; border-color:#e8c97a; border-style:solid;
    }
    #marker-frame::before { top:-2px; left:-2px; border-width:2px 0 0 2px; }
    #marker-frame::after  { bottom:-2px; right:-2px; border-width:0 2px 2px 0; }
    #marker-icon { font-size:clamp(32px,10vw,48px); opacity:.5; }
    #marker-guide p { color:rgba(245,230,200,.7); font-size:clamp(10px,2.5vw,12px); letter-spacing:1.5px; line-height:1.7; text-shadow:0 1px 6px #000; }

    /* Status bar */
    #ar-status {
      position:absolute; bottom:0; left:0; right:0;
      padding:12px 16px 24px;
      background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
      text-align:center;
    }
    #status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#e8c97a; margin-right:8px; animation:pulse 1.5s infinite; }
    #status-dot.detected { background:#4caf50; animation:none; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }
    #status-text { color:rgba(245,230,200,.8); font-size:clamp(10px,2.5vw,12px); letter-spacing:1.5px; text-shadow:0 1px 6px #000; }

    /* Permission error */
    #permission-error {
      position:fixed; inset:0;
      background:rgba(10,6,2,.95);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:32px; z-index:200;
    }
    #permission-error.show { display:flex; }
    #permission-error h2 { color:#e8c97a; font-size:20px; letter-spacing:2px; font-weight:normal; margin-bottom:12px; }
    #permission-error p  { color:rgba(245,230,200,.7); font-size:13px; line-height:1.8; max-width:300px; margin-bottom:24px; }
    #permission-error button {
      background:rgba(46,117,182,.3); border:1px solid rgba(46,117,182,.6);
      color:#7ec8f5; padding:10px 24px; font-size:12px; letter-spacing:2px;
      cursor:pointer; border-radius:2px; font-family:'Georgia',serif;
    }
  </style>
</head>
<body>

<!-- AR UI -->
<div id="ar-ui">
  <div id="ar-header">
    <button id="btn-back" onclick="goBack()">← Museum</button>
    <div id="ar-collection-name">Memuat...</div>
  </div>
  <div id="marker-guide">
    <div id="marker-frame"><div id="marker-icon">⬛</div></div>
    <p>Arahkan kamera ke<br>marker Hiro</p>
  </div>
  <div id="ar-status">
    <span id="status-dot"></span>
    <span id="status-text">Mencari marker...</span>
  </div>
</div>

<!-- Permission Error -->
<div id="permission-error">
  <h2>Akses Kamera</h2>
  <p>Izinkan akses kamera untuk menggunakan fitur AR.<br>Android: gunakan Chrome &nbsp;|&nbsp; iOS: gunakan Safari.</p>
  <button onclick="location.reload()">Coba Lagi</button>
</div>

<!-- AR SCENE -->
<a-scene
  embedded
  arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; facingMode: environment; debugUIEnabled: false; errorPopup: permission-error;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  loading-screen="enabled: false"
>
  <a-assets>
    <a-asset-item id="ar-model-1" src="assets/models/Stag Statue.glb"></a-asset-item>
    <a-asset-item id="ar-model-2" src="assets/models/Statue.glb"></a-asset-item>
    <a-asset-item id="ar-model-3" src="assets/models/MayanTemple.glb"></a-asset-item>
    <img id="ar-p1" src="assets/images/Vincent_van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg" crossorigin="anonymous"/>
    <img id="ar-p2" src="assets/images/Farmhouse_in_Provence,_1888,_Vincent_van_Gogh,_NGA.jpg" crossorigin="anonymous"/>
    <img id="ar-p3" src="assets/images/Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project_(454045).jpg" crossorigin="anonymous"/>
  </a-assets>

  <a-marker preset="hiro" id="hiro-marker">

    <!-- Artefak 1: Stag Statue -->
    <a-entity id="ar-artifact-1" visible="false">
      <a-gltf-model src="#ar-model-1" position="0 0.1 0" scale="0.3 0.3 0.3"
        animation="property:rotation;to:0 360 0;dur:8000;loop:true;easing:linear"></a-gltf-model>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.12 0" rotation="-90 0 0"></a-plane>
      <a-text value="Stag Statue" align="center" color="#e8c97a" width="1.3"
        position="0 -0.11 0" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

    <!-- Artefak 2: Classical Statue -->
    <a-entity id="ar-artifact-2" visible="false">
      <a-gltf-model src="#ar-model-2" position="0 0.1 0" scale="0.5 0.5 0.5"
        animation="property:rotation;to:0 360 0;dur:10000;loop:true;easing:linear"></a-gltf-model>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.12 0" rotation="-90 0 0"></a-plane>
      <a-text value="Classical Statue" align="center" color="#e8c97a" width="1.3"
        position="0 -0.11 0" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

    <!-- Artefak 3: Mayan Temple -->
    <a-entity id="ar-artifact-3" visible="false">
      <a-gltf-model src="#ar-model-3" position="0 0.1 0" scale="0.5 0.5 0.5"
        animation="property:rotation;to:0 360 0;dur:10000;loop:true;easing:linear"></a-gltf-model>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.12 0" rotation="-90 0 0"></a-plane>
      <a-text value="Mayan Temple" align="center" color="#e8c97a" width="1.3"
        position="0 -0.11 0" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

    <!-- Lukisan 1: Starry Night -->
    <a-entity id="ar-painting-1" visible="false">
      <a-box width="1.5" height="1.22" depth="0.04" color="#3d2b0e" position="0 0.65 -0.03"></a-box>
      <a-plane src="#ar-p1" width="1.4" height="1.1" position="0 0.65 0.02"></a-plane>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.01 0" rotation="-90 0 0"></a-plane>
      <a-text value="The Starry Night" align="center" color="#e8c97a" width="1.3"
        position="0 0 0.01" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

    <!-- Lukisan 2: Farmhouse -->
    <a-entity id="ar-painting-2" visible="false">
      <a-box width="1.5" height="1.22" depth="0.04" color="#3d2b0e" position="0 0.65 -0.03"></a-box>
      <a-plane src="#ar-p2" width="1.4" height="1.1" position="0 0.65 0.02"></a-plane>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.01 0" rotation="-90 0 0"></a-plane>
      <a-text value="Farmhouse in Provence" align="center" color="#e8c97a" width="1.3"
        position="0 0 0.01" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

    <!-- Lukisan 3: Self-Portrait -->
    <a-entity id="ar-painting-3" visible="false">
      <a-box width="1.1" height="1.42" depth="0.04" color="#3d2b0e" position="0 0.72 -0.03"></a-box>
      <a-plane src="#ar-p3" width="0.9" height="1.2" position="0 0.65 0.02"></a-plane>
      <a-plane width="1.4" height="0.22" color="#0d0a05" position="0 -0.01 0" rotation="-90 0 0"></a-plane>
      <a-text value="Self-Portrait" align="center" color="#e8c97a" width="1.3"
        position="0 0 0.01" rotation="-90 0 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script src="js/ar-viewer.js"></script>
</body>
</html>
